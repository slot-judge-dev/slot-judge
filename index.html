<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol ZERO Professional</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" href="logo.jpg">
    <style>
        :root { --bg: #0e1117; --panel: #1e2130; --accent: #4A90E2; --text: #ffffff; --danger: #ff4b4b; --success: #00c853; --warning: #ffb300; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .card { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: bold; color: #ccc; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2a2d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; background: var(--bg); color: var(--accent); border: 2px solid var(--accent); cursor: pointer; }
        button:active { background: var(--accent); color: white; }
        .btn-execute { background: var(--accent); color: white; }
        .tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; color: #888; cursor: pointer; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .alert { padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; line-height: 1.5; }
        .alert-success { background: rgba(0, 200, 83, 0.2); border: 1px solid var(--success); color: #81c784; }
        .alert-error { background: rgba(255, 75, 75, 0.2); border: 1px solid var(--danger); color: #e57373; }
        .alert-warning { background: rgba(255, 179, 0, 0.2); border: 1px solid var(--warning); color: #ffd54f; }
        .alert-info { background: rgba(74, 144, 226, 0.2); border: 1px solid var(--accent); color: #64b5f6; }
        .metric { font-size: 1.5em; font-weight: bold; color: var(--success); text-align: center; margin: 10px 0; }
        .vip-content { display: none; border: 1px solid var(--warning); }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.jpg" alt="Logo" style="width: 100%; max-width: 280px; border-radius: 15px; border: 1px solid #333;">
        <h2 style="margin-top: 10px;">🎯 Protocol ZERO</h2>
        <p style="color: #888; font-size: 0.8em; margin-top:-10px;">Strategic Prediction Engine v8.0.2</p>
    </div>

    <div class="card">
        <h3>🔑 環境設定 & VIP</h3>
        <label>交換率 / 投資ステータス</label>
        <div style="display: flex; gap: 10px;">
            <select id="rate"><option value="5.0">5.0枚</option><option value="5.6">5.6枚</option><option value="other">非等価</option></select>
            <select id="invest_type"><option value="medal">持ちメダル</option><option value="cash">現金投資</option></select>
        </div>
        <input type="password" id="pwd" placeholder="VIP認証キー">
        <button onclick="checkVIP()">VIP解放プロトコル実行</button>
        <div id="vip-status" style="margin-top:5px; font-size:0.85em;"></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('tab-expect')">📈 期待値</div>
        <div class="tab" onclick="switchTab('tab-setting')">🔍 設定推測</div>
    </div>

    <div id="tab-expect" class="tab-content active">
        <div class="card">
            <label>液晶あべし数</label>
            <input type="number" id="current_abe" value="0">
            <label><input type="checkbox" id="is_reset"> 朝イチ（リセット天井1280）</label>
            
            <label>前回AT終了後</label>
            <select id="last_status">
                <option value="通常">通常</option>
                <option value="伝承モード示唆">伝承モード示唆</option>
                <option value="★上位AT終了後">★上位AT終了後</option>
            </select>

            <label>モード/前兆示唆</label>
            <select id="shutter_hint">
                <option value="なし">示唆なし</option>
                <option value="特定区間">特定区間でシャッター(B以上濃厚)</option>
                <option value="256超">256超で前兆(B以上濃厚)</option>
            </select>

            <label>現在時刻</label>
            <input type="range" id="time_slider" min="9" max="23" value="12" oninput="document.getElementById('time_val').innerText = this.value + '時'">
            <div id="time_val" style="text-align:right; color:var(--accent);">12時</div>
        </div>

        <div class="card vip-content" id="vip-section">
            <h4 style="color:var(--warning); margin-top:0;">💎 VIP PROFESSIONAL HACK</h4>
            <label>有利区間差枚数 (ツラヌキ判定)</label>
            <input type="range" id="diff_coins" min="-5000" max="5000" step="100" value="0" oninput="document.getElementById('diff_val').innerText = this.value + '枚'">
            <div id="diff_val" style="text-align:right;">0枚</div>
            <label>AI Bro コンサル (現場の違和感)</label>
            <select id="zencho_type">
                <option value="なし">選択なし</option><option value="弱">弱前兆のみ</option>
                <option value="強">天命の刻(強前兆)</option><option value="キャラ">特定キャラ頻出</option>
                <option value="レア">レア役直後</option>
            </select>
        </div>

        <button class="btn-execute" onclick="executeAnalysis()">軍師の最終判断を仰ぐ</button>
        <div id="result-area"></div>
    </div>

    <div id="tab-setting" class="tab-content">
        <div class="card">
            <label>総回転数 (G)</label>
            <input type="number" id="total_rot" value="0">
            <label>初当たり(AT)回数</label>
            <input type="number" id="at_count" value="0">
            <label>サミートロフィー</label>
            <select id="trophy">
                <option value="なし">なし</option><option value="銅">銅</option>
                <option value="金">金以上</option><option value="虹">虹/キリン</option>
            </select>
            <button class="btn-execute" onclick="executeSettingGuess()">設定推測プロトコル実行</button>
            <div id="setting-result-area"></div>
        </div>
    </div>

    <div style="text-align: center; color: #555; font-size: 0.7em; margin-top: 20px;">
        ⚠️ DISCLAIMER: 本アプリはシミュレーション値であり収益を保証しません。<br>
        © 2026 Protocol ZERO v8.0.2
    </div>

<script>
    let isVip = false;
    function switchTab(tId){
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(tId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function checkVIP(){
        if(document.getElementById('pwd').value === 'zero2026'){
            isVip = true;
            document.getElementById('vip-status').innerHTML = "<span style='color:var(--success)'>✅ VIP UNLOCKED</span>";
            document.getElementById('vip-section').style.display = 'block';
        } else {
            alert('認証キーが異なります');
        }
    }

    function executeSettingGuess(){
        const total = parseFloat(document.getElementById('total_rot').value);
        const at = parseFloat(document.getElementById('at_count').value);
        const trophy = document.getElementById('trophy').value;
        if(!total || !at) return;
        const prob = Math.floor(total / at);
        let msg = ""; let cls = "alert-info";
        if(prob <= 245 || trophy === '虹') { msg = "設定6以上の数値です。全ツッパを推奨。"; cls="alert-success"; }
        else if(prob <= 275 || trophy === '金') { msg = "設定4-5の近似値です。粘る価値あり。"; cls="alert-success"; }
        else { msg = "低設定の可能性大。期待値があれば追う程度に。"; cls="alert-error"; }
        document.getElementById('setting-result-area').innerHTML = `<div class="alert ${cls}">📊 初当たり確率: 1/${prob}<br>🤖 AI診断: ${msg}</div>`;
    }

    function executeAnalysis(){
        const abe = parseInt(document.getElementById('current_abe').value) || 0;
        const isReset = document.getElementById('is_reset').checked;
        const lastSt = document.getElementById('last_status').value;
        const shutter = document.getElementById('shutter_hint').value;
        const time = parseInt(document.getElementById('time_slider').value);
        const invest = document.getElementById('invest_type').value;
        const rate = document.getElementById('rate').value;
        const diff = isVip ? parseInt(document.getElementById('diff_coins').value) : 0;
        const zencho = isVip ? document.getElementById('zencho_type').value : "なし";

        const isModeB = (shutter !== "なし");
        const isTsuranuki = (isVip && diff >= 1000);
        const calcEV = (base) => (invest === 'cash' && rate !== '5.0') ? Math.floor(base * 0.65) : base;

        let border = isReset ? 700 : 950;
        if(isTsuranuki) border -= 150;
        if(invest === 'cash' && rate !== '5.0') border += 150;
        if(time >= 18) border += 100;

        let res = `<h3>📊 最終判定報告</h3>`;
        if(time >= 21) res += `<div class="alert alert-error">🚨 閉店リスク大！即ヤメも視野に。</div>`;
        if(isVip) {
            let h = abe > 1000 ? 4500 : (abe > 700 ? 3000 : 1500);
            res += `<div class="metric">⏱️ 想定時給: ￥${calcEV(h)}</div>`;
        }

        const tag = isTsuranuki ? " | 💎 つらぬき期待:高" : "";
        if(isModeB && abe >= 150){
            res += `<div class="alert alert-success">🔥 【特攻GO】通常B濃厚！<br>💰期待値: ￥${calcEV(800)}前後${tag}</div>`;
        } else if(abe >= border || abe >= 1473){
            res += `<div class="alert alert-success">🔥 【判定：GO】<br>💰期待値: ￥${calcEV(2000)}前後${tag}</div>`;
        } else if(abe >= 480 && abe <= 576){
            res += `<div class="alert alert-success">⚡ 【ゾーン狙い】通常C(576)狙い<br>💰期待値: ￥${calcEV(1000)}</div>`;
        } else {
            let next = abe < 100 ? "100" : (abe < 200 ? "200" : (abe < 480 ? "480" : border));
            res += `<div class="alert alert-error">❄️ 【判定：撤収】💰マイナス<br>🎯目安: ${next}あべしまで待機</div>`;
        }

        res += `<h4 style="margin-top:20px;">🛑 ヤメ時プロトコル</h4>`;
        if(lastSt === '★上位AT終了後' || isTsuranuki) res += `<div class="alert alert-warning">🚨 ヤメ厳禁！128あべしまで回せ。</div>`;
        else if(lastSt === '伝承モード示唆') res += `<div class="alert alert-info">伝承ループ確認まで続行。</div>`;
        else res += `<div class="alert alert-info">高確確認後、1あべし即ヤメ。</div>`;

        if(zencho !== "なし"){
            res += `<h4 style="margin-top:20px;">🤖 AIコンサル助言</h4>`;
            if(zencho === "強") res += `<div class="alert alert-success">本前兆の可能性大。失敗後の復活に注意。</div>`;
            else if(zencho === "レア") res += `<div class="alert alert-error">32あべし間は絶対にヤメるな。</div>`;
            else res += `<div class="alert alert-info">フェイク濃厚。ゾーン抜けでヤメ。</div>`;
        }
        document.getElementById('result-area').innerHTML = res;
    }
</script>
</body>
</html>
