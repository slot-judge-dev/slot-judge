<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol ZERO v19.0.0 THE ETERNAL</title>
    <style>
        :root { --bg: #0a0c10; --panel: #161b22; --accent: #58a6ff; --text: #c9d1d9; --danger: #f85149; --success: #3fb950; --warning: #d29922; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; padding-bottom: 120px; -webkit-text-size-adjust: 100%; }
        .sticky-header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 5px 0; border-bottom: 2px solid #30363d; }
        .card { background: var(--panel); padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        label { display: block; margin-bottom: 6px; font-size: 0.85em; font-weight: bold; color: #8b949e; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; font-size: 1em; }
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab { flex: 1; text-align: center; padding: 14px 5px; background: #21262d; border-radius: 8px; cursor: pointer; font-size: 0.85em; color: #8b949e; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }
        button { width: 100%; padding: 20px; border-radius: 12px; font-weight: bold; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .alert { padding: 16px; border-radius: 10px; margin-top: 12px; font-weight: bold; font-size: 1em; line-height: 1.6; border-left: 6px solid transparent; }
        .alert-success { background: rgba(63, 185, 80, 0.1); border-left-color: var(--success); color: #56d364; }
        .alert-error { background: rgba(248, 81, 73, 0.1); border-left-color: var(--danger); color: #ffa198; }
        .alert-warning { background: rgba(210, 153, 34, 0.1); border-left-color: var(--warning); color: #e3b341; }
        .alert-ceiling { background: #f85149; color: white; border: 2px solid white; animation: blink 0.8s infinite; text-align: center; font-size: 1.2em; box-shadow: 0 0 20px rgba(248, 81, 73, 0.6); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .legal-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,12,16,0.98); padding: 15px; font-size: 0.65em; color: #484f58; text-align: center; border-top: 1px solid #30363d; z-index: 2000; pointer-events: none; }
        .live-wage { font-size: 2.4em; font-weight: bold; color: var(--success); text-align: center; margin: 10px 0; text-shadow: 0 0 20px rgba(63, 185, 80, 0.4); }
        .highlight-text { color: var(--danger); font-weight: bold; font-size: 1.1em; text-decoration: underline; }
        .highlight-tsuranuki { color: var(--warning); font-weight: bold; font-size: 1.05em; text-decoration: underline; }
        .clear-btn { background: transparent; color: #8b949e; border: 1px solid #30363d; padding: 10px; font-size: 0.8em; margin-top: 15px; box-shadow: none; cursor: pointer; width: 100%; }
        .clear-btn:hover { background: rgba(248, 81, 73, 0.1); color: #ffa198; border-color: #f85149; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="tabs">
            <div class="tab active">👊 北斗の拳 転生2</div>
            <div class="tab" onclick="alert('甲鉄城のカバネリ：ETERNALロジック適用完了。次回開放')">🚂 カバネリ</div>
        </div>
    </div>

    <div style="text-align: center; margin: 20px 0;">
        <img src="logo.jpg" alt="Logo" style="width: 100%; max-width: 280px; border-radius: 15px; box-shadow: 0 12px 30px rgba(0,0,0,0.7);" onerror="this.src='https://raw.githubusercontent.com/slot-judge-dev/slot-judge/main/logo.jpg'">
        <div style="margin-top: 10px; font-size: 0.85em; color: var(--accent); font-weight: bold; letter-spacing: 5px;">PROTOCOL ZERO v19.0.0 THE ETERNAL</div>
    </div>

    <div class="card">
        <h3>🔑 投資環境 & VIP認証</h3>
        <input type="password" id="pwd" oninput="checkVIP()" placeholder="VIP認証キー (zero2026)">
        <div style="display: flex; gap: 8px;">
            <select id="rate" onchange="updateUI()">
                <option value="5.0">5.0枚 (等価)</option>
                <option value="5.6">5.6枚</option>
                <option value="6.0">6.0枚</option>
                <option value="other">非等価 / その他</option>
            </select>
            <select id="invest_type" onchange="updateUI()">
                <option value="medal">持ちメダル</option>
                <option value="cash">現金投資（ギャップペナルティ完全適用）</option>
            </select>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('tab-main')">📈 投資判定</div>
        <div class="tab" onclick="switchTab('tab-history')">📊 収支履歴</div>
        <div class="tab" onclick="switchTab('tab-guess')">🔍 設定推測</div>
    </div>

    <div id="tab-main" class="tab-content active">
        <div class="card">
            <label>液晶あべし数</label>
            <input type="number" id="current_abe" value="0" oninput="updateUI()">
            
            <label><input type="checkbox" id="is_reset" onchange="updateUI()"> 朝イチ（設定変更/リセット天井1280）</label>
            
            <label>前回AT終了後の状態</label>
            <select id="last_status" onchange="updateUI()">
                <option value="none">通常</option>
                <option value="densho">伝承モード示唆</option>
                <option value="premium">★上位AT(天撃)後</option>
            </select>
            
            <label>モード示唆状況</label>
            <select id="mode_hint" onchange="updateUI()">
                <option value="none">示唆なし</option>
                <option value="shutter">シャッター前兆(通常B以上濃厚)</option>
                <option value="mode_c">通常C以上濃厚</option>
                <option value="heaven">天国濃厚(128)</option>
            </select>
            
            <label>現在時刻 (閉店欠損算出用)</label>
            <input type="range" id="time_slider" min="9" max="23" value="15" oninput="document.getElementById('time_val').innerText = this.value + '時'; updateUI();">
            <div id="time_val" style="text-align:right; color:var(--accent); font-weight:bold;">15時</div>
        </div>

        <div id="vip-section" style="display:none;">
            <div class="card" style="border: 2px solid var(--warning);">
                <div id="wage-display" class="live-wage">￥---</div>
                
                <label style="color:var(--warning);">💎 差枚数スライダー (+1000枚超でボーダー優遇)</label>
                <input type="range" id="diff_coins" min="-3000" max="3000" step="100" value="0" oninput="document.getElementById('diff_val').innerText = this.value + '枚'; updateUI();">
                <div id="diff_val" style="text-align:right; font-size:0.9em; color:var(--accent); font-weight:bold;">0枚</div>
                
                <label style="color:var(--warning);">💎 ボーダー微調整 (±100あべし)</label>
                <input type="range" id="border_adj" min="-100" max="100" step="10" value="0" oninput="document.getElementById('adj_val').innerText = this.value + 'あべし'; updateUI();">
                <div id="adj_val" style="text-align:right; font-size:0.9em; color:var(--accent); font-weight:bold;">0あべし</div>
                
                <label style="color:var(--warning);">🤖 AI Bro コンサル (全変数が計算式に完全連動)</label>
                <select id="ai_consult" onchange="updateUI()">
                    <option value="none">選択なし</option>
                    <option value="weak">ざわざわのみ（弱前兆）</option>
                    <option value="strong">天命の刻移行（強前兆）</option>
                    <option value="char">特定キャラの頻出（通常B以上示唆）</option>
                    <option value="rare">レア役直後（中チェ等）</option>
                </select>

                <label style="color:var(--warning); margin-top:10px;">💬 現場メモ (自動保存)</label>
                <textarea id="vip_memo" oninput="saveMemo()" placeholder="台番号や詳細な違和感をメモ..."></textarea>
            </div>
        </div>

        <button onclick="executeAnalysis()">軍師の最終判断を仰ぐ (EXECUTE)</button>
        <div id="result-area"></div>
    </div>

    <div id="tab-history" class="tab-content">
        <div class="card">
            <h3>📝 収支・稼働記録</h3>
            <div style="display:flex;gap:8px;">
                <input type="number" id="in_medal" placeholder="投資枚数">
                <input type="number" id="out_medal" placeholder="回収枚数">
            </div>
            <button onclick="saveProfit()">収支データを保存する</button>
            <div id="history-list" style="margin-top:15px; font-size:0.85em; max-height:250px; overflow-y:auto;"></div>
            <button class="clear-btn" onclick="clearHistory()">🚨 全履歴データを完全に消去する</button>
        </div>
    </div>

    <div id="tab-guess" class="tab-content">
        <div class="card">
            <h3>🔍 精密設定推測プロトコル</h3>
            <label>総回転数 (G) / 初当たり(AT)回数</label>
            <div style="display:flex;gap:8px;">
                <input type="number" id="total_rot" placeholder="総回転数" oninput="updateUI(); executeSettingGuess();">
                <input type="number" id="at_count" placeholder="AT初当回数" oninput="updateUI(); executeSettingGuess();">
            </div>
            <label>サミートロフィー確認状況 (メイン判定に連動)</label>
            <select id="trophy" onchange="document.getElementById('hidden_trophy').value = this.value; updateUI(); executeSettingGuess();">
                <option value="none">示唆なし</option>
                <option value="gold">金以上確認 (設定4-5確定)</option>
                <option value="rainbow">虹/キリン確認 (設定6確定)</option>
            </select>
            <button onclick="executeSettingGuess()" style="background:var(--success);">AI推測プロトコルを実行</button>
            <div id="setting-result"></div>
        </div>
    </div>

    <input type="hidden" id="hidden_trophy" value="none">

    <div class="legal-footer">
        ※本アプリは独自解析データに基づく期待値シミュレーターであり、収益を完全に保証するものではありません。投資判断は自己責任でお願いします。法的リスク回避：遊技機メーカー様・版権元様とは一切関係ありません。© 2026 Protocol ZERO
    </div>

<script>
    let isVip = false;
    window.onload = () => { 
        renderHistory(); 
        document.getElementById('vip_memo').value = localStorage.getItem('zero_memo') || ""; 
        updateUI(); 
        executeSettingGuess();
    };

    function checkVIP() { 
        if(document.getElementById('pwd').value === 'zero2026') { 
            isVip = true; 
            document.getElementById('vip-section').style.display = 'block'; 
            updateUI(); 
        } 
    }

    function switchTab(id) { 
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        event.currentTarget.classList.add('active'); 
    }

    function saveMemo() { 
        localStorage.setItem('zero_memo', document.getElementById('vip_memo').value); 
    }

    // --- THE ETERNAL：不純物濾過プロトコル適用・全変数独立・相関証明済み数式 ---
    function getLogicStats() {
        const abe = parseInt(document.getElementById('current_abe').value) || 0;
        const inv = document.getElementById('invest_type').value;
        const rate = document.getElementById('rate').value;
        const mode = document.getElementById('mode_hint').value;
        const lastSt = document.getElementById('last_status').value;
        const time = parseInt(document.getElementById('time_slider').value);
        const reset = document.getElementById('is_reset').checked;
        const diff = isVip ? parseInt(document.getElementById('diff_coins').value) : 0;
        const adj = isVip ? parseInt(document.getElementById('border_adj').value) : 0;
        const trophy = document.getElementById('hidden_trophy').value;
        const aiConsult = isVip ? document.getElementById('ai_consult').value : "none";

        // 22時以降：完全演算バイパス（物理的遮断）
        if (time >= 22) {
            return {
                abe: abe, inv: inv, rate: rate, mode: mode, time: time, diff: diff, trophy: trophy,
                isHighSetting: false, isMidSetting: false, lastSt: lastSt, isValidPremium: false, isValidTsuranuki: false,
                reset: reset, aiConsult: aiConsult, isTimeOver: true, remainCeiling: 0, border: 9999, wage: -20000, ev: -5000
            };
        }

        // 賞味期限（128あべし）の物理チェック
        const isValidPremium = (lastSt === 'premium' && abe <= 128);
        const isValidTsuranuki = (isVip && diff >= 1000 && abe <= 128);

        // 設定サンプル数の独立計算
        const t_rot = parseFloat(document.getElementById('total_rot').value) || 0;
        const a_cnt = parseFloat(document.getElementById('at_count').value) || 0;
        const isEnoughSample = (t_rot >= 2000);
        let realProb = (t_rot > 0 && a_cnt > 0) ? Math.floor(t_rot / a_cnt) : 999;
        let isHighSettingProb = (isEnoughSample && realProb <= 245); 
        let isMidSettingProb = (!isHighSettingProb && isEnoughSample && realProb <= 275); 

        // 最大天井の動的逆算（独立定数）
        let maxCeiling = 1536; 
        if (mode === 'heaven') maxCeiling = 128;
        else if (mode === 'mode_c') maxCeiling = 576;
        else if (mode === 'shutter' || aiConsult === 'char') maxCeiling = 896; 
        else if (reset) maxCeiling = 1280;
        let remainCeiling = Math.max(0, maxCeiling - abe);

        // --- 全条件のフラット並列計算（個別の定数計算化によりマスキングを完全防止） ---
        const EV_NONE = -600;
        
        let evAbe = (abe >= 1473) ? 6500 : (abe >= 1100) ? 4300 : (abe >= 750) ? 1600 : (abe >= 480) ? 1150 : (abe >= 200 && abe <= 256) ? 900 : EV_NONE;
        let wageAbe = (abe >= 1100) ? 5500 : (abe > 700) ? 3100 : (abe > 400) ? 1600 : 800;

        let evResetZ = (reset && abe >= 700) ? 1900 : EV_NONE;
        let evResetM = (reset && mode === 'mode_c' && abe >= 350) ? 1350 : EV_NONE;
        let evResetS = (reset && abe >= 450 && abe <= 576) ? 1400 : EV_NONE;
        let evResetL = (reset && abe >= 200 && abe <= 256) ? 1200 : EV_NONE;
        let wageReset = reset ? ((abe >= 400) ? 3300 : 800) : 800;

        let evHeaven = (mode === 'heaven') ? 650 : EV_NONE;
        let evShutter = (mode === 'shutter' && abe >= 150) ? 1400 : EV_NONE;
        let evModeC = (mode === 'mode_c' && abe >= 350) ? 1200 : EV_NONE;
        let wageMode = (mode === 'heaven') ? 5500 : (mode === 'mode_c' || mode === 'shutter') ? 3900 : 800;

        let evPremium = isValidPremium ? 2500 : EV_NONE;
        let evDensho = (lastSt === 'densho') ? 1500 : EV_NONE;
        let wageState = isValidPremium ? 5500 : (lastSt === 'densho') ? 4000 : 800;

        // ボーナス加算の独立計算
        let bonusEV = 0; let bonusWage = 0;
        if (aiConsult === 'strong' || aiConsult === 'rare') { bonusEV += 2500; bonusWage += 3000; }
        else if (aiConsult === 'weak') { bonusEV -= 500; bonusWage -= 1500; }
        else if (aiConsult === 'char') { bonusEV += 300; bonusWage += 500; } 
        if (isValidTsuranuki) { bonusEV += 1000; bonusWage += 1000; }

        // --- Math.maxによる絶対的統合 ---
        let baseEV = Math.max(evAbe, evResetZ, evResetM, evResetS, evResetL, evHeaven, evShutter, evModeC, evPremium, evDensho) + bonusEV;
        let baseWage = Math.max(wageAbe, wageReset, wageMode, wageState) + bonusWage;

        // 設定の絶対的保障
        if (trophy === 'rainbow' || isHighSettingProb) { baseWage = Math.max(baseWage, 8000); baseEV = Math.max(baseEV, 6500); } 
        else if (trophy === 'gold' || isMidSettingProb) { baseWage = Math.max(baseWage, 5000); baseEV = Math.max(baseEV, 3000); }

        // --- 環境ペナルティ：時給・期待値の完全重複連動（相関証明） ---
        let finalEV = baseEV;
        let finalWage = baseWage;

        if (time >= 18) {
            let hp = (time - 17); 
            finalWage -= (hp * 700); 
            finalEV -= (hp * 400);
        }

        if (inv === 'cash' && rate !== '5.0') {
            finalWage -= 2500; 
            if (finalEV > 0) finalEV = Math.floor(finalEV * 0.60); 
        }

        // --- ボーダー算出の独立計算 ---
        let baseBorder = 950; let isAbsoluteGo = false; 
        if (trophy === 'rainbow' || trophy === 'gold' || isHighSettingProb || isMidSettingProb) { baseBorder = 0; isAbsoluteGo = true; } 
        else if (isValidPremium || lastSt === 'densho') { baseBorder = 0; isAbsoluteGo = true; } 
        else if (aiConsult === 'strong' || aiConsult === 'rare' || mode === 'heaven') { baseBorder = 0; isAbsoluteGo = true; } 
        else if (mode === 'shutter') baseBorder = 150; 
        else if (mode === 'mode_c') baseBorder = 350; 
        else if (reset) baseBorder = 700; 
        
        if (aiConsult === 'char' && mode !== 'shutter' && !isAbsoluteGo) baseBorder = Math.max(0, baseBorder - 100);

        // ペナルティのボーダーへの連動
        if (time >= 18 && !isAbsoluteGo) { baseBorder += 100; if (time >= 21) baseBorder += 100; }
        if (inv === 'cash' && rate !== '5.0' && !isAbsoluteGo) baseBorder += 150;
        if (isValidTsuranuki && !isAbsoluteGo) baseBorder = Math.max(0, baseBorder - 150); 

        return { 
            abe: abe, inv: inv, rate: rate, mode: mode, time: time, diff: diff, trophy: trophy,
            isHighSetting: isHighSettingProb, isMidSetting: isMidSettingProb, lastSt: lastSt,
            isValidPremium: isValidPremium, isValidTsuranuki: isValidTsuranuki, reset: reset,
            aiConsult: aiConsult, isTimeOver: false, remainCeiling: remainCeiling, 
            border: isAbsoluteGo ? 0 : Math.max(0, baseBorder + adj), 
            wage: Math.floor(finalWage), 
            ev: Math.floor(finalEV)
        };
    }

    function updateUI() { 
        if(!isVip) return; 
        const stats = getLogicStats();
        const wageElem = document.getElementById('wage-display');
        wageElem.innerText = `想定時給: ￥${stats.wage}`; 
        wageElem.style.color = stats.wage >= 0 ? "var(--success)" : "var(--danger)"; 
    }

    function executeAnalysis() {
        const s = getLogicStats();
        let res = `<h3>📊 最終戦略分析報告</h3>`;
        if (s.isTimeOver) {
            res += `<div class="alert alert-error" style="background:#ff4b4b; color:white;">🚨 【致命的警告】22時を過ぎています。取り切れません。即時帰宅。</div>`;
            document.getElementById('result-area').innerHTML = res; return; 
        }

        const evColor = s.ev > 0 ? "var(--success)" : "var(--danger)";
        const evDisp = (val) => `<br><span style="font-size:1.1em; font-weight:bold; color:${evColor};">💰期待値: ￥${val}前後</span><br><span style="font-size:0.85em; color:#8b949e;">🎯最大天井まで残り: <b>${s.remainCeiling}</b> あべし</span>`;

        // 【最優先：絶対撤収シールド】
        if (s.ev < 0 && s.abe < 1100) {
            let nt = s.border;
            if (s.mode === 'mode_c' && s.border > 350) nt = Math.min(s.border, 350); 
            else if ((s.mode === 'shutter' || s.aiConsult === 'char') && s.border > 150) nt = Math.min(s.border, 150);
            res += `<div class="alert alert-error" style="border-left: 6px solid #ff4b4b;">❄️ 【絶対撤収命令】<br>環境ペナルティにより、<b>期待値が赤字（￥${s.ev}）</b>です。直ちに撤収してください。<br>🎯 待機目安: <b>${nt}あべし</b>${evDisp(s.ev)}</div>`;
        } 
        else {
            // プラス圏判定：ヒエラルキー絶対厳守、全パターン一行記述
            if (s.abe >= 1473) res += `<div class="alert alert-warning">⚠️ PREMIUM AREA<br>ATレベル3以上濃厚恩恵確定！${evDisp(s.ev)}<br><span style="color:var(--danger); text-decoration:underline;">🚨 当選まで絶対にヤメないでください。</span></div>`;
            else if (s.abe >= 1100) res += `<div class="alert alert-ceiling">👊 【天井到達圏内】<br>期待値極限。${evDisp(s.ev)}<br><span style="text-decoration:underline;">🚨 当選までヤメ厳禁。</span></div>`;
            else if (s.trophy === 'rainbow') res += `<div class="alert alert-success">🏆 虹トロフィー!! 設定6確定。閉店まで全ツッパ。${evDisp(s.ev)}</div>`;
            else if (s.isHighSetting) res += `<div class="alert alert-success">📈 優秀台データ!! 設定6濃厚。全ツッパ推奨。${evDisp(s.ev)}</div>`;
            else if (s.trophy === 'gold') res += `<div class="alert alert-success">🏅 金トロフィー!! 設定4-5確定。粘り。${evDisp(s.ev)}</div>`;
            else if (s.isMidSetting) res += `<div class="alert alert-success">📈 高設定挙動!! 設定4-5濃厚。積極的に攻め。${evDisp(s.ev)}</div>`;
            else if (s.aiConsult === 'strong' || s.aiConsult === 'rare') res += `<div class="alert alert-success">🔥 【前兆特攻】激アツ。即確保！${evDisp(s.ev)}</div>`;
            else if (s.isValidPremium) res += `<div class="alert alert-success">🔥 【上位AT後・特攻】天国期待度極大。128まで。${evDisp(s.ev)}</div>`;
            else if (s.lastSt === 'densho') res += `<div class="alert alert-success">🔥 【伝承モード中】天破ループ。${evDisp(s.ev)}</div>`;
            else if (s.isValidTsuranuki) res += `<div class="alert alert-success">💎 【VIP特攻】差枚恩恵。128までフォロー。${evDisp(s.ev)}</div>`;
            else if (s.mode === 'heaven') res += `<div class="alert alert-success">✨ 【天国濃厚】128当選濃厚。${evDisp(s.ev)}</div>`;
            else if (s.mode === 'shutter' && s.abe >= s.border) res += `<div class="alert alert-success">🔥 【通常B濃厚：特攻GO】896天井狙い。${evDisp(s.ev)}</div>`;
            else if (s.reset && s.mode === 'mode_c' && s.abe >= s.border) res += `<div class="alert alert-success">🔥 【リセット×通常C：特攻GO】${evDisp(s.ev)}</div>`;
            else if (s.mode === 'mode_c' && s.abe >= s.border) res += `<div class="alert alert-success">🔥 【通常C濃厚：特攻GO】576天井狙い。${evDisp(s.ev)}</div>`;
            else if (s.reset && s.abe >= s.border) res += `<div class="alert alert-success">🔥 【リセット天井：特攻GO】1280天井狙い。${evDisp(s.ev)}</div>`;
            else if (s.abe >= s.border) res += `<div class="alert alert-success">🔥 【判定：GO】ボーダー突破。期待値十分。${evDisp(s.ev)}</div>`;
            else if (s.abe >= 750 && s.abe <= 896) res += `<div class="alert alert-info">⚡ 【ゾーン】通常B狙い。896天井まで。${evDisp(s.ev)}</div>`;
            else if (s.reset && s.abe >= 450 && s.abe <= 576) res += `<div class="alert alert-info">⚡ 【リセット】500ゾーン狙い。${evDisp(s.ev)}</div>`;
            else if (s.reset && s.abe >= 200 && s.abe <= 256) res += `<div class="alert alert-info">⚡ 【リセット】256ゾーン狙い。${evDisp(s.ev)}</div>`;
            else if (s.abe >= 480 && s.abe <= 576) res += `<div class="alert alert-info">⚡ 【ゾーン】通常C狙い。576天井まで。${evDisp(s.ev)}</div>`;
            else if (s.abe >= 200 && s.abe <= 256) res += `<div class="alert alert-info">⚡ 【ゾーン】256ゾーン狙い。${evDisp(s.ev)}</div>`;
            else {
                let nt = s.border; 
                if (s.mode === 'mode_c' && s.border > 350) nt = Math.min(s.border, 350); 
                else if ((s.mode === 'shutter' || s.aiConsult === 'char') && s.border > 150) nt = Math.min(s.border, 150);
                res += `<div class="alert alert-error">❄️ 【判定：撤収】期待値不足。待機。🎯 目安: <b>${nt}あべし</b>${evDisp(s.ev)}</div>`;
            }
        }

        // --- 聖域：ヤメ時4分岐プロトコル ---
        let yMsg = "";
        if (s.abe >= 1100) yMsg = "<span class='highlight-text'>当選までヤメ厳禁（天井保護）</span>";
        else if (s.aiConsult === 'strong' || s.aiConsult === 'rare') yMsg = "<span class='highlight-text'>本前兆・激アツ。絶対に席を立つな。</span>";
        else if (s.isValidPremium) yMsg = "①【上位AT後】128まで天国率大幅UP。絶対にヤメるな。";
        else if (s.lastSt === 'densho') yMsg = "②【伝承モード】ループ抜け確認まで続行。";
        else if (s.isValidTsuranuki) yMsg = "③<span class='highlight-tsuranuki'>【VIP差枚】有利リセット近接。128ヤメ厳禁。</span>";
        else yMsg = "④【通常】高確・前兆なしを確認し、1あべし即ヤメ。";
        res += `<div class="alert alert-warning">🛑 ヤメ時ナビ：<br>${yMsg}</div>`;

        if (s.aiConsult !== "none") {
            let advice = "";
            if (s.aiConsult === "weak") advice = "フェイク前兆の可能性高。規定あべしハズレで即ヤメ推奨。";
            else if (s.aiConsult === "strong") advice = "本前兆期待度大幅アップ。演出失敗後も復活警戒。";
            else if (s.aiConsult === "char") advice = "通常B以上の滞在を示唆。次回ゾーンまで追うか相談。";
            else if (s.aiConsult === "rare") advice = "絶対にヤメるな。32あべし間は完全フォロー必須。";
            res += `<div class="alert alert-info">🤖 AI Bro コンサル：💡 ${advice}</div>`;
        }
        document.getElementById('result-area').innerHTML = res;
    }

    function saveProfit() { 
        const i = parseInt(document.getElementById('in_medal').value)||0; 
        const o = parseInt(document.getElementById('out_medal').value)||0; 
        const p = o-i; const d = new Date().toLocaleDateString(); 
        let h = JSON.parse(localStorage.getItem('zero_h')||"[]"); 
        h.unshift({date:d, profit:p}); localStorage.setItem('zero_h', JSON.stringify(h.slice(0,10))); renderHistory(); 
    }
    function renderHistory() { 
        let h = JSON.parse(localStorage.getItem('zero_h')||"[]"); 
        let html = h.map(x => `<div>${x.date}: <b style="color:${x.profit>=0?'#56d364':'#ffa198'}">${x.profit>=0?'+':''}${x.profit}枚</b></div>`).join(''); 
        document.getElementById('history-list').innerHTML = html || "履歴なし"; 
    }
    function clearHistory() { if(confirm('🚨 全消去します。よろしいですか？')) { localStorage.removeItem('zero_h'); renderHistory(); } }

    function executeSettingGuess() {
        const t = parseFloat(document.getElementById('total_rot').value);
        const a = parseFloat(document.getElementById('at_count').value);
        if(t > 0 && a > 0) {
            const p = Math.floor(t/a); const trophy = document.getElementById('hidden_trophy').value;
            let m = ""; let cls = "alert-info";
            let sw = (t < 2000) ? "<br><span style='font-size:0.8em; color:var(--warning);'>※サンプル不足。確率は参考値です。</span>" : "";
            if (trophy === 'rainbow') { m = "【設定6確定】虹トロ。閉店まで全ツッパ。"; cls = "alert-success"; }
            else if (p <= 245) { m = "【設定6濃厚】極上の初当たり確率。全ツッパ推奨。"; cls = "alert-success"; }
            else if (trophy === 'gold') { m = "【設定4-5確定】金トロ。粘る価値が極めて高い。"; cls = "alert-success"; }
            else if (p <= 275) { m = "【設定4-5濃厚】優秀な数値。粘る価値大。"; cls = "alert-success"; }
            else if (p <= 320) { m = "【設定3付近】中間設定。期待値を優先し慎重に。"; cls = "alert-warning"; }
            else { m = "【低設定濃厚】危険。期待値ボーダーを厳守。"; cls = "alert-error"; }
            document.getElementById('setting-result').innerHTML = `<div class="alert ${cls}">📊 確率: 1/${p}${sw}<br>🤖 AI診断: ${m}</div>`;
        }
    }
</script>
</body>
</html>
